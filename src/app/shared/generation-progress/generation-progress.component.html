<mat-card><mat-card-header><mat-card-title>Generation progress</mat-card-title><mat-card-subtitle>{{ job?.status || 'idle' }}</mat-card-subtitle></mat-card-header><mat-card-content><mat-progress-bar mode="determinate" [value]="job?.progress || 0" /><p>{{ job?.message || 'Ready to generate enterprise architecture artifacts.' }}</p><mat-chip-set><mat-chip *ngFor="let c of categories()">{{ c[0] }} {{ c[1] }}%</mat-chip></mat-chip-set></mat-card-content></mat-card>
