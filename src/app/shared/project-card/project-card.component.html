<mat-card class="project-card" [routerLink]="['/projects', project.id]" tabindex="0" role="link">
  <mat-card-header>
    <mat-card-title>{{ project.name }}</mat-card-title>
    <mat-card-subtitle>{{ subtitle }}</mat-card-subtitle>
    <app-status-badge [value]="project.status || 'DRAFT'" />
  </mat-card-header>
  <mat-card-content>
    <mat-progress-bar mode="determinate" [value]="project.completion ?? 0" />
    <dl>
      <div><dt>Artifacts</dt><dd>{{ project.generatedArtifacts ?? 0 }}</dd></div>
      <div><dt>Risks</dt><dd>{{ project.openRisks ?? 0 }}</dd></div>
      <div><dt>Security</dt><dd>{{ project.securityScore ?? 0 }}%</dd></div>
      <div><dt>Monthly</dt><dd>{{ project.estimatedMonthlyCost ?? 0 | currency }}</dd></div>
    </dl>
  </mat-card-content>
</mat-card>
