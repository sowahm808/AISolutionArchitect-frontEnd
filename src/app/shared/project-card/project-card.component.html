<mat-card class="project-card"><mat-card-header><mat-card-title>{{ project.name }}</mat-card-title><mat-card-subtitle>{{ project.company }} · {{ project.cloudProvider }} · {{ project.migrationType }}</mat-card-subtitle><app-status-badge [value]="project.status" /></mat-card-header><mat-card-content><mat-progress-bar mode="determinate" [value]="project.completion" /><dl><div><dt>Artifacts</dt><dd>{{ project.generatedArtifacts }}</dd></div><div><dt>Risks</dt><dd>{{ project.openRisks }}</dd></div><div><dt>Security</dt><dd>{{ project.securityScore }}%</dd></div><div><dt>Monthly</dt><dd>{{ project.estimatedMonthlyCost | currency }}</dd></div></dl></mat-card-content></mat-card>
