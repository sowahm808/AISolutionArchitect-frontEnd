<table mat-table [dataSource]="risks" class="mat-elevation-z1"><ng-container matColumnDef="risk"><th mat-header-cell *matHeaderCellDef>Risk</th><td mat-cell *matCellDef="let r">{{ r.risk || r.title }}</td></ng-container><ng-container matColumnDef="category"><th mat-header-cell *matHeaderCellDef>Category</th><td mat-cell *matCellDef="let r">{{ r.category }}</td></ng-container><ng-container matColumnDef="severity"><th mat-header-cell *matHeaderCellDef>Severity</th><td mat-cell *matCellDef="let r"><app-status-badge [value]="r.severity" /></td></ng-container><ng-container matColumnDef="probability"><th mat-header-cell *matHeaderCellDef>Probability</th><td mat-cell *matCellDef="let r">{{ r.probability }}</td></ng-container><ng-container matColumnDef="impact"><th mat-header-cell *matHeaderCellDef>Impact</th><td mat-cell *matCellDef="let r">{{ r.impact }}</td></ng-container><ng-container matColumnDef="mitigation"><th mat-header-cell *matHeaderCellDef>Mitigation</th><td mat-cell *matCellDef="let r">{{ r.mitigation }}</td></ng-container><ng-container matColumnDef="owner"><th mat-header-cell *matHeaderCellDef>Owner</th><td mat-cell *matCellDef="let r">{{ r.owner }}</td></ng-container><ng-container matColumnDef="status"><th mat-header-cell *matHeaderCellDef>Status</th><td mat-cell *matCellDef="let r">{{ r.status }}</td></ng-container><tr mat-header-row *matHeaderRowDef="riskColumns"></tr><tr mat-row *matRowDef="let row; columns: riskColumns"></tr></table>
