<mat-sidenav-container class="shell">
  <mat-sidenav mode="side" opened class="shell__nav">
    <mat-toolbar color="primary" class="brand">
      <mat-icon aria-hidden="true">auto_awesome</mat-icon>
      <span>AI Solution Architect</span>
    </mat-toolbar>

    <mat-nav-list class="shell__nav-list">
      <a mat-list-item *ngFor="let n of visibleNav()" [routerLink]="navPath(n)" routerLinkActive="active">
        <mat-icon matListItemIcon aria-hidden="true">{{ n.icon }}</mat-icon>
        <span matListItemTitle>{{ n.label }}</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar class="topbar">
      <span>Enterprise architecture workspace</span>
      <span class="spacer"></span>
      <a mat-button routerLink="/profile" class="profile-link" aria-label="Open profile">
        <mat-icon aria-hidden="true">account_circle</mat-icon>
        <span class="profile-link__text">
          <strong>{{ store.user()?.name || "Architect" }}</strong>
          <small>{{ store.user()?.role || "Viewer" }}</small>
        </span>
      </a>
      <button mat-stroked-button color="primary" type="button" (click)="logout()">
        <mat-icon aria-hidden="true">logout</mat-icon>
        Logout
      </button>
    </mat-toolbar>
    <main class="content"><router-outlet /></main>
  </mat-sidenav-content>
</mat-sidenav-container>
