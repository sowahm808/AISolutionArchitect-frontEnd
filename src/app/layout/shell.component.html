<mat-sidenav-container class="shell">
  <mat-sidenav mode="side" opened class="shell__nav">
    <mat-toolbar color="primary" class="brand">
      <mat-icon aria-hidden="true">auto_awesome</mat-icon>
      <span>AI Solution Architect</span>
    </mat-toolbar>

    <mat-nav-list>
      <a mat-list-item *ngFor="let n of nav" [routerLink]="n.path" routerLinkActive="active">
        <mat-icon matListItemIcon aria-hidden="true">{{ n.icon }}</mat-icon>
        <span matListItemTitle>{{ n.label }}</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar class="topbar">
      <span>Enterprise architecture workspace</span>
      <span class="spacer"></span>
      <mat-icon aria-hidden="true">account_circle</mat-icon>
      <strong>{{ store.user()?.name || "Architect" }}</strong>
    </mat-toolbar>
    <main class="content"><router-outlet /></main>
  </mat-sidenav-content>
</mat-sidenav-container>
